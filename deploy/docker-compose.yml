services:
  api:
    build:
      context: ..
      dockerfile: api/Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ../ml/artifacts:/app/ml/artifacts:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 3s
      retries: 5

  mcp_server:
    build:
      context: ..
      dockerfile: mcp_server/Dockerfile
    environment:
      API_URL: http://api:8000
    ports:
      - "8001:8001"
    depends_on:
      api:
        condition: service_healthy

  openwebui:
    image: ghcr.io/open-webui/open-webui:main
    ports:
      - "3000:8080"
    environment:
      # Point OpenWebUI at the MCP server. Adjust per OpenWebUI version
      # (some releases use OPENAI_API_BASE_URLS with the mcp-bridge plugin,
      # others use TOOL_SERVER_CONNECTIONS). See deploy/README.md.
      MCP_SERVERS: '[{"name":"laptop-price","url":"http://mcp_server:8001"}]'
    volumes:
      - openwebui_data:/app/backend/data
    depends_on:
      - mcp_server

volumes:
  openwebui_data:
